services:
  webprincipal:
    container_name: webprincipal
    image: webprincipal
    build:
      context: .
      dockerfile: WebPrincipal/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      Jwt__Key: ${JWT__Key}
      Jwt__Issuer: ${JWT__Issuer}
      Jwt__Audience: ${JWT__Audience}
      Jwt__DurationInMinutes: ${JWT__DurationInMinutes}
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17
    container_name: webprincipal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: webprincipal-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  prometheus:
    image: prom/prometheus
    container_name: webprincipal-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: webprincipal-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data: