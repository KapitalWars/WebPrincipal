services:
  conqueco:
    image: conqueco
    container_name: conqueco
    build:
      context: .
      dockerfile: Conqueco/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17
    container_name: conqueco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: